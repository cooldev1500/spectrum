<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echoes • Shared Constellation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --accent: #ff66cc; }
    body {
        margin:0; padding:0;
        background: linear-gradient(180deg, #1a0022, #2a0033);
        color:#eee;
        font-family:system-ui, sans-serif;
        min-height:100vh;
    }
    header {
        background:rgba(0,0,0,0.6);
        padding:20px;
        text-align:center;
        border-bottom:3px solid var(--accent);
    }
    h1 { margin:0; font-size:2em; }
    .container { max-width:1100px; margin:0 auto; padding:20px; }
    .card-grid {
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
        gap:18px;
    }
    .echo-card {
        background:rgba(255,255,255,0.08);
        border-radius:16px;
        padding:18px;
        border:1px solid #550077;
        position:relative;
    }
    .echo-card h3 {
        margin:0 0 12px 0;
        font-size:1.1em;
        color:#ff99dd;
    }
    .axis {
        width:100%;
        height:180px;
        background:#1f0033;
        border-radius:12px;
        position:relative;
        border:2px solid #660099;
        cursor:crosshair;
        margin-top:8px;
    }
    .dot {
        position:absolute;
        width:18px;
        height:18px;
        background:var(--accent);
        border-radius:50%;
        border:2px solid white;
        box-shadow:0 0 12px var(--accent);
        transform:translate(-50%, -50%);
        pointer-events:none;
    }
    button {
        background:var(--accent);
        color:white;
        border:none;
        padding:16px 32px;
        font-size:1.1em;
        border-radius:12px;
        cursor:pointer;
        width:100%;
        margin-top:25px;
    }
    button:hover { filter:brightness(1.15); }
    .results { display:none; }
    .constellation { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:15px; }
    .echo-result {
        background:rgba(255,102,204,0.15);
        border:1px solid var(--accent);
        padding:16px;
        border-radius:12px;
    }
</style>
</head>
<body>

<header>
    <h1>Echoes</h1>
    <p>A private constellation of curiosities • Only shared echoes appear</p>
</header>

<div class="container">

    <div id="intro">
        <p style="text-align:center; max-width:680px; margin:40px auto; font-size:1.1em;">
            We each quietly explore the same set of echoes.<br>
            Only the ones we both feel drawn to will light up together.
        </p>
        <button onclick="startEchoes()">Begin the Constellation</button>
    </div>

    <div id="echoes" style="display:none;">
        <div id="cardGrid" class="card-grid"></div>
        <button onclick="finishEchoes()">Finish & Get My Code</button>
    </div>

    <div id="results" class="results">
        <h2 style="text-align:center;margin-bottom:20px;">Your Shared Constellation</h2>
        <div id="constellation" class="constellation"></div>
        
        <div style="margin-top:40px;text-align:center;">
            <button onclick="exportLog()">Export Full Private Log (for me only)</button>
        </div>
    </div>
</div>

<script>
// ==================== ECHO CARDS (22 dimensions) ====================
const echoes = [
    {id:"desire", title:"Feeling strongly desired by someone new"},
    {id:"noticed", title:"Being noticed or looked at with clear interest"},
    {id:"exhibit-light", title:"Light risk of being seen or watched"},
    {id:"exhibit-bold", title:"Being playfully bold in semi-public spaces"},
    {id:"involve-general", title:"Involving another person in some way"},
    {id:"power-play", title:"Light power play or giving/taking control"},
    {id:"taboo", title:"Exploring something a little taboo or forbidden"},
    {id:"intensity", title:"How intense or passionate the experience feels"},
    {id:"watching", title:"Watching or being watched by others"},
    {id:"bisexual", title:"Bisexual or same-gender curiosity"},
    {id:"proximity", title:"How close or familiar the other person is"},
    {id:"emotional", title:"Strong emotional or romantic charge"},
    {id:"tease", title:"Being teased or building anticipation"},
    {id:"risk", title:"A small element of risk or adrenaline"},
    {id:"public", title:"Being bold in a place where others could notice"},
    {id:"control", title:"Giving up control for a moment"},
    {id:"attention", title:"Receiving a lot of focused attention"},
    {id:"mystery", title:"The thrill of something unknown or new"},
    {id:"aftercare", title:"Feeling safe and cared for afterward"},
    {id:"fantasy-only", title:"Pure fantasy with no real-world intention"},
];

let myEchoData = {};

function startEchoes() {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('echoes').style.display = 'block';
    renderEchoCards();
}

function renderEchoCards() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = '';

    echoes.forEach(echo => {
        const cardHTML = `
        <div class="echo-card">
            <h3>${echo.title}</h3>
            <div class="axis" id="axis-${echo.id}">
                <div class="dot" id="dot-${echo.id}" style="left:50%; top:70%;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85em;margin-top:6px;opacity:0.7;">
                <span>Less appealing</span>
                <span>More appealing</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85em;margin-top:4px;opacity:0.7;">
                <span>Low willingness</span>
                <span>High willingness</span>
            </div>
        </div>`;
        grid.innerHTML += cardHTML;
    });

    // Make each axis draggable
    echoes.forEach(echo => {
        const axis = document.getElementById(`axis-${echo.id}`);
        const dot = document.getElementById(`dot-${echo.id}`);
        
        axis.addEventListener('mousedown', (e) => dragDot(e, axis, dot, echo.id));
        axis.addEventListener('touchstart', (e) => dragDot(e, axis, dot, echo.id));
    });
}

function dragDot(e, axis, dot, id) {
    e.preventDefault();
    const rect = axis.getBoundingClientRect();
    
    function move(e) {
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        let x = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
        let y = Math.max(0, Math.min(100, ((clientY - rect.top) / rect.height) * 100));
        
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        
        myEchoData[id] = {x: Math.round(x), y: Math.round(y)};
    }
    
    function stop() {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', stop);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', stop);
    }
    
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
    document.addEventListener('touchmove', move);
    document.addEventListener('touchend', stop);
}

function finishEchoes() {
    const code = btoa(JSON.stringify(myEchoData)).slice(0, 18);
    alert(`Your Echo Code:\n\n${code}\n\nSend this code to your partner.`);
    showSharedMap(myEchoData, code);
}

function showSharedMap(myData, myCode) {
    document.getElementById('echoes').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    
    let html = `<p style="text-align:center;opacity:0.8;">Enter your partner's code to see the shared constellation</p>
                <input type="text" id="partnerCodeInput" placeholder="Paste partner's code here" style="width:100%;padding:16px;margin:15px 0;border-radius:12px;background:#2a0044;border:1px solid #660099;color:white;">
                <button onclick="loadPartner('${myCode}')">Reveal Shared Echoes</button>`;
    
    document.getElementById('constellation').innerHTML = html;
}

function loadPartner(myCode) {
    const input = document.getElementById('partnerCodeInput').value.trim();
    if (!input) return alert("Please enter the partner's code");
    
    try {
        const partnerData = JSON.parse(atob(input));
        let html = `<h3 style="text-align:center;margin-bottom:20px;">Your Shared Constellation</h3>`;
        
        echoes.forEach(echo => {
            const mine = myData[echo.id] || {x:50, y:70};
            const theirs = partnerData[echo.id] || {x:50, y:70};
            const overlapScore = Math.max(0, 100 - Math.abs(mine.x - theirs.x) - Math.abs(mine.y - theirs.y));
            
            if (overlapScore > 60) {
                html += `
                <div class="echo-result">
                    <strong>${echo.title}</strong><br>
                    Strong overlap detected
                </div>`;
            }
        });
        
        document.getElementById('constellation').innerHTML = html;
    } catch(e) {
        alert("Invalid code – please check and try again.");
    }
}

function exportLog() {
    const log = JSON.stringify(myEchoData, null, 2);
    const blob = new Blob([log], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'echoes-full-private-log.txt';
    a.click();
}
</script>
</body>
</html>
